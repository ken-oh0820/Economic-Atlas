<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="Economic Atlas — 글로벌 경제 대시보드 2025">
<meta property="og:description" content="99개국 경제 데이터 + 실시간 환율·원자재 시세·뉴스를 인터랙티브 세계지도로 탐색">
<meta property="og:type" content="website">

<title>글로벌 경제 지도 — Economic Atlas 2025</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>
<style>
:root{--bg:#070d18;--surface:#0c1422;--surface2:#111b2e;--border:#1c2d45;--accent:#00d4ff;--accent2:#ff6b35;--accent3:#39ff14;--accent4:#ffd700;--text:#dceefb;--text-dim:#3d607f;--text-mid:#7a9fc2;--header-bg:rgba(7,13,24,0.98);--ctrl-bg:rgba(10,18,30,0.92);--tooltip-bg:rgba(5,10,20,0.97);--rank-border:rgba(28,45,69,0.5);--rank-hover:rgba(0,212,255,0.04);--metric-active-bg:rgba(0,212,255,0.07);--logo-shadow:0 0 22px rgba(0,212,255,0.4)}
body.light{--bg:#f0f4f8;--surface:#fff;--surface2:#e8eef5;--border:#c8d8e8;--accent:#0077cc;--accent2:#e05520;--accent3:#22a800;--accent4:#c08800;--text:#1a2a3a;--text-dim:#7a9ab8;--text-mid:#3a6080;--header-bg:rgba(240,244,248,0.98);--ctrl-bg:rgba(220,235,248,0.95);--tooltip-bg:rgba(240,244,248,0.98);--rank-border:rgba(180,210,235,0.6);--rank-hover:rgba(0,119,204,0.05);--metric-active-bg:rgba(0,119,204,0.07);--logo-shadow:0 0 18px rgba(0,119,204,0.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR','IBM Plex Mono',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
header{background:var(--header-bg);border-bottom:1px solid var(--border);padding:0 16px;height:54px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;backdrop-filter:blur(8px)}
.logo{display:flex;flex-direction:column}.logo-main{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:5px;color:var(--accent);text-shadow:var(--logo-shadow)}.logo-sub{font-size:9px;letter-spacing:2px;color:var(--text-mid);display:flex;align-items:center;gap:6px;margin-top:2px}
.signal-dot{width:6px;height:6px;border-radius:50%;background:var(--accent3);animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.header-stats{display:flex;align-items:center;gap:8px}.stat-pill{background:var(--surface2);border:1px solid var(--border);padding:5px 10px;font-size:9px;letter-spacing:1px}.stat-label{color:var(--text-dim);margin-right:5px}.stat-value{color:var(--accent);font-family:'IBM Plex Mono',monospace;font-weight:500}
.layout{display:flex;flex:1;overflow:hidden;min-height:0}
.sidebar-left,.sidebar-right{width:200px;flex-shrink:0;background:var(--surface);overflow-y:auto;display:flex;flex-direction:column}.sidebar-left{border-right:1px solid var(--border)}.sidebar-right{border-left:1px solid var(--border)}.sidebar-left>div,.sidebar-right>div{padding:12px;border-bottom:1px solid var(--border)}
.panel-title{font-size:8px;letter-spacing:2px;color:var(--text-dim);margin-bottom:9px;text-transform:uppercase}
.metric-btn{width:100%;padding:8px 10px;background:transparent;border:1px solid var(--border);color:var(--text-mid);font-family:inherit;font-size:9px;letter-spacing:0.8px;cursor:pointer;text-align:left;transition:all 0.2s;margin-bottom:4px;display:flex;align-items:center;gap:8px}.metric-btn:hover{border-color:var(--accent);color:var(--text)}.metric-btn.active{border-color:var(--accent);background:var(--metric-active-bg);color:var(--accent);box-shadow:inset 3px 0 0 var(--accent)}
#legendCanvas{width:100%;display:block;margin-bottom:4px}.legend-labels{display:flex;justify-content:space-between;font-size:8px;color:var(--text-dim)}
.rank-item{padding:6px 8px;border:1px solid var(--rank-border);margin-bottom:3px;cursor:pointer;transition:background 0.15s;display:flex;align-items:center;gap:7px}.rank-item:hover{background:var(--rank-hover);border-color:var(--accent)}.rank-num{font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--text-dim);min-width:18px}.rank-name{font-size:9px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.rank-val{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:500}.rank-bar-bg{height:2px;background:var(--border);margin-top:3px;border-radius:2px}
.map-container{flex:1;position:relative;overflow:hidden;min-width:0}
.map-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:9px;letter-spacing:2px;color:var(--text-mid);pointer-events:none;white-space:nowrap;z-index:1000;background:var(--header-bg);padding:4px 14px;border:1px solid var(--border);backdrop-filter:blur(6px)}
.year-watermark{position:absolute;bottom:30px;right:20px;font-family:'Bebas Neue',sans-serif;font-size:80px;color:rgba(0,212,255,0.045);pointer-events:none;user-select:none;letter-spacing:8px;z-index:999}body.light .year-watermark{color:rgba(0,80,160,0.05)}
#map{width:100%;height:100%;z-index:1}
.overlay-btn{width:100%;padding:6px 9px;background:transparent;border:1px solid var(--border);color:var(--text-mid);font-family:inherit;font-size:9px;letter-spacing:0.6px;cursor:pointer;text-align:left;transition:all 0.2s;margin-bottom:3px;display:flex;align-items:center;gap:6px}.overlay-btn:hover{border-color:var(--accent);color:var(--text)}.overlay-btn.active{border-color:var(--accent);background:var(--metric-active-bg);color:var(--accent)}.overlay-btn.resource{border-color:var(--accent4);color:var(--accent4)}.overlay-btn.resource.active{background:rgba(255,215,0,0.06)}
#resSubMenu{display:none;margin-left:10px;margin-bottom:4px}.res-sub-btn{width:100%;padding:4px 8px;background:transparent;border:1px solid var(--border);color:var(--text-mid);font-family:inherit;font-size:8.5px;cursor:pointer;text-align:left;margin-bottom:2px;transition:all 0.15s}.res-sub-btn:hover{border-color:var(--accent4);color:var(--accent4)}.res-sub-btn.res-active{border-color:var(--accent4);color:var(--accent4);background:rgba(255,215,0,0.06)}
.overlay-legend{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}.ol-pill{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--text-mid)}.ol-dot{width:8px;height:8px;border-radius:50%}
#tooltip{position:fixed;display:none;background:var(--tooltip-bg);border:1px solid var(--border);padding:10px 13px;pointer-events:none;z-index:2000;min-width:200px;font-size:10px;backdrop-filter:blur(12px)}.tt-name{font-size:12px;font-weight:500;margin-bottom:8px;color:var(--text)}.tt-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid var(--border);color:var(--text-mid)}.tt-highlight{color:var(--accent);font-weight:500}
.country-card{font-size:10px}.country-name-big{font-size:16px;font-weight:500;margin-bottom:3px}.country-region{font-size:8px;letter-spacing:2px;color:var(--text-dim);margin-bottom:12px}.metric-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}.metric-card{padding:8px;background:var(--surface2);border:1px solid var(--border)}.mc-label{font-size:7px;letter-spacing:1px;color:var(--text-dim);margin-bottom:4px}.mc-value{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500}.mc-value.gdp{color:var(--accent)}.mc-value.trade{color:var(--accent2)}.mc-value.unemp{color:var(--accent4)}.mc-value.infl{color:var(--accent3)}
.rank-badge{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:var(--surface2);border:1px solid var(--border);font-size:10px}.rank-badge span:last-child{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--accent)}
.insight-box{font-size:9px;color:var(--text-mid);line-height:1.7;padding:8px 10px;background:var(--surface2);border:1px solid var(--border)}.placeholder-text{text-align:center;color:var(--text-dim);font-size:10px;padding:20px 0;line-height:1.8}
.loading-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:2000}.loading-text{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:4px;color:var(--accent)}.loading-bar{width:150px;height:2px;background:var(--border);margin-top:10px;overflow:hidden;position:relative}.loading-bar::after{content:'';position:absolute;width:50%;height:100%;background:var(--accent);animation:load 1.2s ease-in-out infinite}@keyframes load{0%{left:-50%}100%{left:100%}}
.leaflet-container{background:var(--bg)!important}.leaflet-control-zoom,.leaflet-control-attribution{display:none!important}
.map-controls{position:absolute;bottom:16px;left:16px;display:flex;flex-direction:column;gap:4px;z-index:1001}.map-ctrl-btn{width:30px;height:30px;background:var(--ctrl-bg);border:1px solid var(--border);color:var(--text-mid);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;padding:0;backdrop-filter:blur(8px)}.map-ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}#labelToggleBtn{width:auto;padding:0 8px;font-size:10px;letter-spacing:0.5px;font-family:inherit;color:var(--accent);border-color:var(--accent)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.country-label-div{font-family:'IBM Plex Mono',monospace;font-size:8px;color:var(--text-mid);text-shadow:0 0 4px var(--bg),0 0 8px var(--bg),1px 1px 2px rgba(0,0,0,0.8);white-space:nowrap;pointer-events:none;letter-spacing:0.5px}body.light .country-label-div{text-shadow:0 0 4px #fff,0 0 8px rgba(255,255,255,0.9);color:var(--text-mid)}
/* Ticker bar */
.ticker-bar{background:var(--surface);border-bottom:1px solid var(--border);height:28px;display:flex;align-items:center;overflow:hidden;flex-shrink:0;position:relative;z-index:9}
.ticker-track{display:flex;align-items:center;gap:0;animation:tickerScroll 40s linear infinite;white-space:nowrap}
.ticker-track:hover{animation-play-state:paused}
@keyframes tickerScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:5px;padding:0 18px;font-size:9px;font-family:'IBM Plex Mono',monospace;color:var(--text-mid);border-right:1px solid var(--border)}
.ticker-label{color:var(--text-dim);font-size:8px;letter-spacing:0.5px}
.ticker-val{font-weight:500;color:var(--text)}
.ticker-chg{font-size:8px;padding:1px 4px;border-radius:2px}
.ticker-up{color:#22dd66;background:rgba(34,221,102,0.08)}.ticker-down{color:#ff4466;background:rgba(255,68,102,0.08)}.ticker-flat{color:var(--text-dim)}
.live-dot{width:5px;height:5px;border-radius:50%;background:#ff3344;animation:livePulse 1.5s infinite;margin-right:4px;flex-shrink:0}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 4px #ff3344}50%{opacity:0.4;box-shadow:none}}
.live-tag{font-size:7px;color:#ff4466;letter-spacing:1px;display:flex;align-items:center;padding:0 14px;font-family:'IBM Plex Mono',monospace}
/* Live data panels in sidebar */
.live-section{border-bottom:1px solid var(--border);padding:10px 12px}
.live-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.live-header .panel-title{margin-bottom:0}
.refresh-btn{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:10px;cursor:pointer;padding:2px 6px;border-radius:2px;font-family:inherit;transition:all 0.15s}
.refresh-btn:hover{border-color:var(--accent);color:var(--accent)}
.commodity-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:9px}
.commodity-row:last-child{border-bottom:none}
.commodity-name{color:var(--text-mid);display:flex;align-items:center;gap:5px}
.commodity-price{font-family:'IBM Plex Mono',monospace;font-weight:500;color:var(--text)}
.news-item{padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background 0.15s}
.news-item:hover{background:var(--rank-hover)}
.news-item:last-child{border-bottom:none}
.news-title{font-size:9px;color:var(--text);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.news-meta{font-size:7px;color:var(--text-dim);margin-top:3px;letter-spacing:0.3px}
.news-source{color:var(--accent);font-weight:500}
.data-loading{font-size:8px;color:var(--text-dim);text-align:center;padding:12px 0;letter-spacing:1px}
.data-error{font-size:8px;color:#ff6666;text-align:center;padding:8px 0}
.last-update{font-size:7px;color:var(--text-dim);text-align:right;margin-top:6px;letter-spacing:0.3px}
</style>
</head>
<body>
<header><div class="logo"><div class="logo-main">ECONOMIC ATLAS</div><div class="logo-sub"><span class="signal-dot"></span> 글로벌 경제 대시보드 2025</div></div><div class="header-stats"><div class="stat-pill"><span class="stat-label">세계 GDP</span><span class="stat-value">$117.2T</span></div><div class="stat-pill"><span class="stat-label">데이터 기준</span><span class="stat-value">2025</span></div><div class="stat-pill"><span class="stat-label">표시 국가</span><span class="stat-value" id="countryCount">—</span></div><button class="map-ctrl-btn" id="themeToggle" onclick="toggleTheme()" style="width:auto;padding:0 8px;font-size:14px">🌙</button></div></header>
<div class="ticker-bar" id="tickerBar">
  <div class="live-tag"><span class="live-dot"></span>LIVE</div>
  <div style="overflow:hidden;flex:1"><div class="ticker-track" id="tickerTrack"><span class="ticker-item"><span class="ticker-label">로딩 중...</span></span></div></div>
</div>
<div class="layout">
<div class="sidebar-left">
<div><div class="panel-title">경제 지표 선택</div><button class="metric-btn active" onclick="setMetric('gdp',this)"><span class="metric-icon">📊</span> GDP / 국내총생산</button><button class="metric-btn" onclick="setMetric('trade',this)"><span class="metric-icon">🚢</span> 무역 수출입</button><button class="metric-btn" onclick="setMetric('unemployment',this)"><span class="metric-icon">📉</span> 실업률</button><button class="metric-btn" onclick="setMetric('inflation',this)"><span class="metric-icon">💹</span> 인플레이션율</button></div>
<div><div class="panel-title">범례</div><canvas id="legendCanvas" height="10"></canvas><div class="legend-labels"><span id="legendMin">$5B</span><span id="legendMax">$30T+</span></div></div>
<div><div class="panel-title">TOP 10 순위</div><div id="rankingList"></div></div>
<div><div class="panel-title">지도 오버레이</div><button class="overlay-btn" onclick="setOverlay('nato',this)">🔵 NATO 회원국</button><button class="overlay-btn" onclick="setOverlay('brics',this)">🟠 BRICS 정식 회원국</button><button class="overlay-btn" onclick="setOverlay('g7',this)">🟢 G7 회원국</button><button class="overlay-btn" onclick="setOverlay('polsys',this)">🟣 정치체제 구분</button><button class="overlay-btn resource" onclick="toggleResMenu(this)">🟡 천연자원 보유국</button><div id="resSubMenu"><button class="res-sub-btn" onclick="setResOverlay('oil_prod',this)">🛢️ 석유 생산량</button><button class="res-sub-btn" onclick="setResOverlay('oil_export',this)">🛢️ 석유 수출량</button><button class="res-sub-btn" onclick="setResOverlay('gas_prod',this)">💨 천연가스 생산량</button><button class="res-sub-btn" onclick="setResOverlay('gas_export',this)">💨 천연가스 수출량</button><button class="res-sub-btn" onclick="setResOverlay('uranium',this)">☢️ 우라늄</button><button class="res-sub-btn" onclick="setResOverlay('lithium',this)">🔋 리튬</button><button class="res-sub-btn" onclick="setResOverlay('rare_earth',this)">⚗️ 희토류</button><button class="res-sub-btn" onclick="setResOverlay('tungsten',this)">🪨 텅스텐</button><button class="res-sub-btn" onclick="setResOverlay('all',this)">🌐 전체</button></div><button class="overlay-btn" onclick="setOverlay('none',this)">⬜ 오버레이 해제</button><div class="overlay-legend" id="overlayLegendBox"></div></div>
</div>
<div class="map-container" id="mapContainer">
<div class="loading-overlay" id="loadingOverlay"><div class="loading-text">LOADING MAP DATA</div><div class="loading-bar"></div><div id="loadingStatus" style="font-size:9px;color:var(--text-dim);margin-top:4px;letter-spacing:1px">지도 타일 로딩 중...</div></div>
<div class="map-label" id="metricLabel">GDP — 국내총생산 (십억 USD)</div>
<div class="year-watermark">2025</div>
<div id="map"></div>
<div class="map-controls"><button class="map-ctrl-btn" onclick="map.zoomIn()">＋</button><button class="map-ctrl-btn" onclick="map.zoomOut()">－</button><button class="map-ctrl-btn" onclick="map.setView([20,0],2.3)">⌖</button><button class="map-ctrl-btn" id="labelToggleBtn" onclick="toggleLabels()">A·Z</button></div>
</div>
<div class="sidebar-right">
<div><div class="panel-title">국가 상세 정보</div><div id="countryDetail"><div class="placeholder-text">지도에서 국가를<br>클릭하세요</div></div></div>
<div class="live-section"><div class="live-header"><div class="panel-title" style="display:flex;align-items:center;gap:5px"><span class="live-dot"></span>원자재 시세</div><button class="refresh-btn" onclick="fetchCommodities()">↻</button></div><div id="commodityPanel"><div class="data-loading">시세 로딩 중...</div></div><div class="last-update" id="commodityTime"></div></div>
<div class="live-section"><div class="live-header"><div class="panel-title" style="display:flex;align-items:center;gap:5px"><span class="live-dot"></span>글로벌 경제 뉴스</div><button class="refresh-btn" onclick="fetchNews()">↻</button></div><div id="newsPanel" style="max-height:220px;overflow-y:auto"><div class="data-loading">뉴스 로딩 중...</div></div><div class="last-update" id="newsTime"></div></div>
<div><div class="panel-title">글로벌 인사이트</div><div id="insights"></div></div>
<div><div class="panel-title">지역별 GDP 비중</div><div id="regionChart"></div></div>
</div>
</div>

function makeLogScale(d,cA,cB){const lo=Math.log(Math.max(d[0],1e-9)),hi=Math.log(Math.max(d[1],1e-9));return v=>{const t=Math.max(0,Math.min(1,(Math.log(Math.max(v,1e-9))-lo)/(hi-lo)));return interpolateColor(cA,cB,t);};}

function getResourceList(id){return Object.entries(RESOURCES).filter(([,r])=>r.countries.has(id)).map(([,r])=>r);}

let curMetric='gdp',isLight=false,selId=null,curOverlay='none',showLabels=true,curResource=null;
let colorScale,geoLayer,map,labelMarkers=[],darkTiles,lightTiles,currentTiles;
function pad(id){return String(id).padStart(3,'0');}
function getStroke(){return isLight?'rgba(0,80,160,0.22)':'rgba(0,200,255,0.15)';}
function getFill(rawId){const id=pad(rawId);if(curOverlay==='nato')return natoMembers.has(id)?'#1a44cc':(isLight?'#c8d8e8':'#090f1a');if(curOverlay==='brics')return bricsMembers.has(id)?'#cc6600':(isLight?'#c8d8e8':'#090f1a');if(curOverlay==='g7')return g7Members.has(id)?'#22aa66':(isLight?'#c8d8e8':'#090f1a');if(curOverlay==='polsys'){const p=polSys[id];return p?polColors[p]:(isLight?'#c8d8e8':'#090f1a');}if(curOverlay==='resource'){if(curResource==='all'){const l=getResourceList(id);if(l.length>1)return'#ffdd00';if(l.length===1)return l[0].color;return isLight?'#c8d8e8':'#090f1a';}const r=RESOURCES[curResource];return r&&r.countries.has(id)?r.color:(isLight?'#c8d8e8':'#090f1a');}const d=eData[id];if(!d)return isLight?mCfg[curMetric].lightNoData:mCfg[curMetric].darkNoData;try{return colorScale(d[curMetric]);}catch(e){return'#0b1520';}}
function getOpacity(rawId){const id=pad(rawId);if(curOverlay==='nato')return natoMembers.has(id)?0.85:0.15;if(curOverlay==='brics')return bricsMembers.has(id)?0.85:0.15;if(curOverlay==='g7')return g7Members.has(id)?0.85:0.15;if(curOverlay==='polsys')return polSys[id]?0.75:0.15;if(curOverlay==='resource'){if(curResource==='all')return getResourceList(id).length>0?0.85:0.12;const r=RESOURCES[curResource];return r&&r.countries.has(id)?0.85:0.12;}return eData[id]?0.7:0.2;}
function updateColors(){colorScale=isLight?mCfg[curMetric].lightScale():mCfg[curMetric].darkScale();if(!geoLayer)return;geoLayer.eachLayer(layer=>{const id=pad(layer.feature.id);layer.setStyle({fillColor:getFill(id),fillOpacity:getOpacity(id),color:getStroke(),weight:0.6});});}

function showTip(e,iso){const d=eData[iso];if(!d)return;const tt=document.getElementById('tooltip');const badges=[natoMembers.has(iso)?'<span style="background:#1a44cc;color:#fff;font-size:8px;padding:1px 5px;border-radius:2px">NATO</span>':'',bricsMembers.has(iso)?'<span style="background:#cc6600;color:#fff;font-size:8px;padding:1px 5px;border-radius:2px">BRICS</span>':''].filter(Boolean).join(' ');const pS=polSys[iso];const pLabel=pS?`<span style="color:${polColors[pS]};font-size:9px">● ${polLabels[pS]}</span>`:'';const rl=getResourceList(iso);const resRow=rl.length?`<div class="tt-row" style="border-bottom:none;padding-top:5px;flex-wrap:wrap;gap:4px"><span style="color:var(--text-dim)">자원</span>${rl.map(r=>`<span style="background:${r.color}22;border:1px solid ${r.color}66;color:${r.color};font-size:8px;padding:1px 5px;border-radius:2px">${r.icon}${r.label}</span>`).join('')}</div>`:'';tt.innerHTML=`<div class="tt-name">${d.flag} ${d.name}</div>${(badges||pLabel)?`<div style="margin-bottom:7px;display:flex;gap:5px;align-items:center;flex-wrap:wrap">${badges}${pLabel}</div>`:''}<div class="tt-row"><span>GDP</span><span class="${curMetric==='gdp'?'tt-highlight':''}">${mCfg.gdp.fmt(d.gdp)}</span></div><div class="tt-row"><span>무역</span><span class="${curMetric==='trade'?'tt-highlight':''}">${mCfg.trade.fmt(d.trade)}</span></div><div class="tt-row"><span>실업률</span><span class="${curMetric==='unemployment'?'tt-highlight':''}">${d.unemployment}%</span></div><div class="tt-row"><span>인플레</span><span class="${curMetric==='inflation'?'tt-highlight':''}">${d.inflation}%</span></div>${resRow}`;tt.style.display='block';tt.style.left=Math.min(e.originalEvent.clientX+14,window.innerWidth-215)+'px';tt.style.top=Math.min(e.originalEvent.clientY-8,window.innerHeight-200)+'px';}
function hideTip(){document.getElementById('tooltip').style.display='none';}
function renderDetail(iso){const d=eData[iso];if(!d)return;const rnk=getRank(iso,'gdp');const badges=[natoMembers.has(iso)?'<span style="background:#1a44cc;color:#fff;font-size:8px;padding:2px 6px;border-radius:2px">NATO</span>':'',bricsMembers.has(iso)?'<span style="background:#cc6600;color:#fff;font-size:8px;padding:2px 6px;border-radius:2px">BRICS</span>':'',polSys[iso]?`<span style="border:1px solid ${polColors[polSys[iso]]};color:${polColors[polSys[iso]]};font-size:8px;padding:2px 6px;border-radius:2px">${polLabels[polSys[iso]]}</span>`:''].filter(Boolean).join('');document.getElementById('countryDetail').innerHTML=`<div class="country-card"><div class="country-name-big">${d.flag} ${d.name}</div><div class="country-region">${d.region}</div>${badges?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px">${badges}</div>`:''}<div class="metric-grid"><div class="metric-card"><div class="mc-label">GDP</div><div class="mc-value gdp">${mCfg.gdp.fmt(d.gdp)}</div></div><div class="metric-card"><div class="mc-label">무역규모</div><div class="mc-value trade">${mCfg.trade.fmt(d.trade)}</div></div><div class="metric-card"><div class="mc-label">실업률</div><div class="mc-value unemp">${d.unemployment}%</div></div><div class="metric-card"><div class="mc-label">인플레이션</div><div class="mc-value infl">${d.inflation}%</div></div></div><div class="rank-badge"><span>GDP 세계 순위</span><span>#${rnk}</span></div>${(()=>{const rl=getResourceList(iso);return rl.length?`<div style="margin-top:9px;padding:8px 11px;background:var(--bg);border:1px solid var(--border)"><div style="font-size:7px;letter-spacing:1px;color:var(--text-dim);margin-bottom:7px">보유 천연자원</div><div style="display:flex;flex-wrap:wrap;gap:5px">${rl.map(r=>`<span style="background:${r.color}22;border:1px solid ${r.color}88;color:${r.color};font-size:9px;padding:2px 7px;border-radius:2px">${r.icon} ${r.label}</span>`).join('')}</div></div>`:'';})()}</div>`;}
function getRank(id,key){return Object.entries(eData).sort((a,b)=>b[1][key]-a[1][key]).findIndex(([c])=>c===id)+1;}
function renderRankings(){const cfg=mCfg[curMetric],col=isLight?cfg.lightColor:cfg.darkColor;const sorted=Object.entries(eData).sort((a,b)=>b[1][curMetric]-a[1][curMetric]).slice(0,10);const max=sorted[0][1][curMetric];document.getElementById('rankingList').innerHTML=sorted.map(([id,d],i)=>`<div class="rank-item" onclick="clickRank('${id}')"><span class="rank-num">${i+1}</span><div style="flex:1;min-width:0"><div style="display:flex;justify-content:space-between"><span class="rank-name">${d.flag} ${d.name}</span><span class="rank-val" style="color:${col}">${cfg.fmt(d[curMetric])}</span></div><div class="rank-bar-bg"><div style="height:100%;width:${(d[curMetric]/max*100).toFixed(1)}%;background:${col};border-radius:2px;opacity:0.75"></div></div></div></div>`).join('');}
function clickRank(id){selId=id;renderDetail(id);if(geoLayer)geoLayer.eachLayer(l=>{const lid=pad(l.feature.id);l.setStyle(lid===id?{weight:2.5,color:'rgba(0,212,255,0.9)'}:{weight:0.6,color:getStroke()});});}
function renderLegend(){const canvas=document.getElementById('legendCanvas');if(!canvas.offsetWidth)return;const W=canvas.offsetWidth;canvas.width=W;canvas.height=10;const ctx=canvas.getContext('2d');const sc=isLight?mCfg[curMetric].lightScale():mCfg[curMetric].darkScale();const domain=curMetric==='unemployment'?[0,35]:curMetric==='gdp'?[5,31000]:curMetric==='trade'?[1,6500]:[0.5,270];const isLog=curMetric!=='unemployment';for(let i=0;i<W;i++){const t=i/W;let v;if(isLog)v=Math.exp(Math.log(Math.max(domain[0],1e-9))+(Math.log(Math.max(domain[1],1e-9))-Math.log(Math.max(domain[0],1e-9)))*t);else v=domain[0]+(domain[1]-domain[0])*t;ctx.fillStyle=sc(v);ctx.fillRect(i,0,1,10);}document.getElementById('legendMin').textContent=mCfg[curMetric].min;document.getElementById('legendMax').textContent=mCfg[curMetric].max;}
function renderInsight(){document.getElementById('insights').innerHTML=`<div class="insight-box">${mCfg[curMetric].insight}</div>`;}
function renderRegionChart(){const regions={};Object.values(eData).forEach(d=>{regions[d.region]=(regions[d.region]||0)+d.gdp;});const total=Object.values(regions).reduce((a,b)=>a+b,0);const col=isLight?mCfg.gdp.lightColor:mCfg.gdp.darkColor;document.getElementById('regionChart').innerHTML=Object.entries(regions).sort((a,b)=>b[1]-a[1]).map(([r,v])=>`<div style="margin-bottom:7px"><div style="display:flex;justify-content:space-between;font-size:9px;color:var(--text-mid);margin-bottom:3px"><span>${r}</span><span style="color:${col}">${(v/total*100).toFixed(1)}%</span></div><div style="height:3px;background:var(--border);border-radius:2px"><div style="height:100%;width:${(v/total*100).toFixed(1)}%;background:${col};border-radius:2px;opacity:0.8"></div></div></div>`).join('');}
function renderAll(){renderRankings();renderLegend();renderInsight();renderRegionChart();if(selId)renderDetail(selId);}

const extraNames={"192":"쿠바","591":"파나마","222":"엘살바도르","112":"벨라루스","688":"세르비아","807":"북마케도니아","352":"아이슬란드","400":"요르단","512":"오만","496":"몽골","834":"탄자니아","562":"니제르","466":"말리","854":"부르키나파소","324":"기니","384":"코트디부아르","768":"토고","204":"베냉","178":"콩고공화국","108":"부룬디","646":"르완다","072":"보츠와나","450":"마다가스카르","598":"파푸아뉴기니"};
function renderLabels(){labelMarkers.forEach(m=>map.removeLayer(m));labelMarkers=[];if(!showLabels)return;const zoom=map.getZoom(),bounds=map.getBounds();Object.entries(LABEL_POS).forEach(([iso,[lon,lat]])=>{const name=eData[iso]?.name??extraNames[iso];if(!name)return;const hasData=!!eData[iso];if(!hasData&&zoom<4)return;if(smallC.has(iso)&&zoom<4)return;if(zoom<2.2)return;const ll=L.latLng(lat,lon);if(!bounds.contains(ll))return;const label=zoom>=4?name:(name.length>5?name.slice(0,4)+'.':name);const m=L.marker(ll,{icon:L.divIcon({className:'country-label-div',html:label,iconSize:null,iconAnchor:[0,0]}),interactive:false});m.setOpacity(hasData?0.85:0.5);m.addTo(map);labelMarkers.push(m);});}

function initMap(){
  map=L.map('map',{center:[20,0],zoom:2.3,minZoom:2,maxZoom:10,zoomSnap:0.1,zoomDelta:0.5,worldCopyJump:true,maxBounds:[[-85,-200],[85,200]],maxBoundsViscosity:0.8});
  darkTiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19});
  lightTiles=L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:19});
  currentTiles=darkTiles;currentTiles.addTo(map);
  colorScale=mCfg[curMetric].darkScale();
  document.getElementById('loadingStatus').textContent='GeoJSON 로딩 중...';
  fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(r=>r.json()).then(topo=>{
    const countries=topojson.feature(topo,topo.objects.countries);
    // Fix antimeridian: Russia, Fiji etc. cross the 180° line causing render artifacts
    countries.features.forEach(f=>{
      function fixRings(rings){rings.forEach(ring=>{let prev=ring[0][0];for(let i=1;i<ring.length;i++){while(ring[i][0]-prev>180)ring[i][0]-=360;while(ring[i][0]-prev<-180)ring[i][0]+=360;prev=ring[i][0];}});}
      if(f.geometry.type==='Polygon')fixRings(f.geometry.coordinates);
      else if(f.geometry.type==='MultiPolygon')f.geometry.coordinates.forEach(p=>fixRings(p));
    });
    geoLayer=L.geoJSON(countries,{
      style:f=>{const id=pad(f.id);return{fillColor:getFill(id),fillOpacity:getOpacity(id),color:getStroke(),weight:0.6};},
      onEachFeature:(f,layer)=>{const id=pad(f.id);layer.on({
        mouseover:e=>{if(eData[id]){showTip(e,id);e.target.setStyle({weight:2,color:'rgba(0,212,255,0.9)'});e.target.bringToFront();}},
        mousemove:e=>{const tt=document.getElementById('tooltip');tt.style.left=Math.min(e.originalEvent.clientX+14,window.innerWidth-215)+'px';tt.style.top=Math.min(e.originalEvent.clientY-8,window.innerHeight-200)+'px';},
        mouseout:e=>{hideTip();const sid=pad(e.target.feature.id);e.target.setStyle({weight:sid===selId?2.5:0.6,color:sid===selId?'rgba(0,212,255,0.9)':getStroke()});},
        click:e=>{const cid=pad(e.target.feature.id);if(!eData[cid])return;if(geoLayer)geoLayer.eachLayer(l=>l.setStyle({weight:0.6,color:getStroke()}));e.target.setStyle({weight:2.5,color:'rgba(0,212,255,0.9)'});e.target.bringToFront();selId=cid;renderDetail(cid);}
      });}
    }).addTo(map);
    document.getElementById('countryCount').textContent=Object.keys(eData).length+'개국';
    document.getElementById('loadingOverlay').style.display='none';
    renderAll();renderLabels();
  }).catch(err=>{document.getElementById('loadingStatus').textContent='로딩 실패 — 인터넷 연결 확인';console.error(err);});
  map.on('zoomend moveend',()=>renderLabels());
}
initMap();

// ═══════════════════════════════════════════════════════
// LIVE DATA — Exchange Rates, Commodities, News
// ═══════════════════════════════════════════════════════
const TICKER_CURRENCIES = [
  {code:'USD',label:'미국 달러',icon:'🇺🇸',multi:1},
  {code:'JPY',label:'일본 엔(100)',icon:'🇯🇵',multi:100},
  {code:'EUR',label:'유로',icon:'🇪🇺',multi:1},
  {code:'CNY',label:'중국 위안',icon:'🇨🇳',multi:1},
  {code:'GBP',label:'영국 파운드',icon:'🇬🇧',multi:1},
  {code:'CHF',label:'스위스 프랑',icon:'🇨🇭',multi:1},
  {code:'CAD',label:'캐나다 달러',icon:'🇨🇦',multi:1},
  {code:'AUD',label:'호주 달러',icon:'🇦🇺',multi:1},
];

let prevRates = {};

async function fetchExchangeRates() {
  try {
    // frankfurter.app — KRW 기준
    const res = await fetch('https://api.frankfurter.app/latest?from=KRW');
    const data = await res.json();
    // data.rates gives KRW→X (e.g. KRW→USD = 0.000689), we need X→KRW
    const items = TICKER_CURRENCIES.map(c => {
      const rateKrwToX = data.rates[c.code];
      if (!rateKrwToX) return null;
      // 1 foreign unit = ? KRW
      const val = (1 / rateKrwToX) * c.multi;
      const key = c.code;
      const prev = prevRates[key];
      // 환율 상승 = 원화 약세(빨강), 하락 = 원화 강세(초록) — 한국 관례와 반대로 보이지 않도록
      const chgClass = prev ? (val > prev ? 'ticker-down' : val < prev ? 'ticker-up' : 'ticker-flat') : 'ticker-flat';
      const chgSymbol = prev ? (val > prev ? '▲' : val < prev ? '▼' : '') : '';
      prevRates[key] = val;
      const formatted = val >= 100 ? val.toFixed(1) : val.toFixed(2);
      const unitLabel = c.multi > 1 ? `${c.multi}${c.code}` : c.code;
      return `<span class="ticker-item"><span class="ticker-label">${c.icon} ${c.label}</span><span class="ticker-val">₩${Number(formatted).toLocaleString()}</span>${chgSymbol?`<span class="ticker-chg ${chgClass}">${chgSymbol}</span>`:''}</span>`;
    }).filter(Boolean).join('');
    document.getElementById('tickerTrack').innerHTML = items + items;
  } catch(e) {
    console.error('Exchange rate fetch failed:', e);
    document.getElementById('tickerTrack').innerHTML = '<span class="ticker-item"><span class="ticker-label" style="color:#ff6666">환율 데이터 로딩 실패 — 인터넷 연결 확인</span></span>';
  }
}

async function fetchCommodities() {
  const panel = document.getElementById('commodityPanel');
  panel.innerHTML = '<div class="data-loading">시세 로딩 중...</div>';
  try {
    // Use allorigins proxy for Yahoo Finance commodity quotes
    const symbols = [
      {sym:'CL=F',name:'WTI 원유',icon:'🛢️',unit:'$/bbl'},
      {sym:'BZ=F',name:'브렌트유',icon:'🛢️',unit:'$/bbl'},
      {sym:'NG=F',name:'천연가스',icon:'💨',unit:'$/MMBtu'},
      {sym:'GC=F',name:'금',icon:'🥇',unit:'$/oz'},
    ];
    const results = [];
    for (const s of symbols) {
      try {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${s.sym}?range=2d&interval=1d`;
        const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
        const res = await fetch(proxyUrl);
        const proxy = await res.json();
        const data = JSON.parse(proxy.contents);
        const meta = data.chart.result[0].meta;
        const price = meta.regularMarketPrice;
        const prevClose = meta.chartPreviousClose || meta.previousClose;
        const chg = prevClose ? ((price - prevClose) / prevClose * 100) : 0;
        results.push({...s, price, chg});
      } catch(err) {
        results.push({...s, price: null, chg: 0});
      }
    }
    panel.innerHTML = results.map(r => {
      if (!r.price) return `<div class="commodity-row"><span class="commodity-name">${r.icon} ${r.name}</span><span style="color:var(--text-dim);font-size:8px">불러오기 실패</span></div>`;
      const chgClass = r.chg > 0 ? 'ticker-up' : r.chg < 0 ? 'ticker-down' : 'ticker-flat';
      const chgStr = r.chg > 0 ? `+${r.chg.toFixed(2)}%` : `${r.chg.toFixed(2)}%`;
      return `<div class="commodity-row"><span class="commodity-name">${r.icon} ${r.name}</span><span><span class="commodity-price">$${r.price.toFixed(2)}</span> <span class="ticker-chg ${chgClass}" style="font-size:8px">${chgStr}</span></span></div>`;
    }).join('');
    document.getElementById('commodityTime').textContent = `최종 갱신: ${new Date().toLocaleTimeString('ko-KR')}`;
  } catch(e) {
    console.error('Commodity fetch failed:', e);
    panel.innerHTML = '<div class="data-error">시세 데이터를 불러올 수 없습니다</div>';
  }
}

async function fetchNews() {
  const panel = document.getElementById('newsPanel');
  panel.innerHTML = '<div class="data-loading">뉴스 로딩 중...</div>';

  // RSS feeds to try in order
  const feeds = [
    {url:'https://news.google.com/rss/topics/CAAqJggKIiBDQkFTRWdvSUwyMHZNRGx6TVdZU0FtdHZHZ0pMVWlnQVAB?hl=ko&gl=KR&ceid=KR:ko', name:'Google 뉴스', topic:'경제'},
    {url:'https://feeds.bbci.co.uk/news/business/rss.xml', name:'BBC Business'},
    {url:'https://rss.nytimes.com/services/xml/rss/nyt/Business.xml', name:'NYT Business'},
  ];

  async function tryRss2json(feedUrl, feedName) {
    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(feedUrl)}&count=10`);
    const data = await res.json();
    if (data.status === 'ok' && data.items?.length) return data.items.map(i=>({...i, _src: feedName}));
    return null;
  }

  async function tryAllorigins(feedUrl, feedName) {
    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(feedUrl)}`);
    const proxy = await res.json();
    const parser = new DOMParser();
    const xml = parser.parseFromString(proxy.contents, 'text/xml');
    const entries = xml.querySelectorAll('item, entry');
    if (!entries.length) return null;
    return [...entries].slice(0, 10).map(el => {
      const title = el.querySelector('title')?.textContent || '';
      const link = el.querySelector('link')?.textContent || el.querySelector('link')?.getAttribute('href') || '';
      const pubDate = el.querySelector('pubDate, published, updated')?.textContent || '';
      return { title, link, pubDate, _src: feedName };
    });
  }

  let items = null;
  for (const feed of feeds) {
    if (items) break;
    try { items = await tryRss2json(feed.url, feed.name); } catch(e) {}
    if (items) break;
    try { items = await tryAllorigins(feed.url, feed.name); } catch(e) {}
  }

  if (items && items.length) {
    panel.innerHTML = items.slice(0, 8).map(item => {
      const date = item.pubDate ? new Date(item.pubDate) : null;
      const timeStr = date && !isNaN(date) ? date.toLocaleDateString('ko-KR',{month:'short',day:'numeric'})+' '+date.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'}) : '';
      const source = item._src || item.feed?.title || '';
      const title = (item.title||'').replace(/<[^>]+>/g,'').replace(/&amp;/g,'&').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&#39;/g,"'").replace(/&quot;/g,'"').slice(0,90);
      const link = (item.link||'#').replace(/'/g,'%27');
      return `<div class="news-item" onclick="window.open('${link}','_blank')"><div class="news-title">${title}</div><div class="news-meta"><span class="news-source">${source}</span>${timeStr?' · '+timeStr:''}</div></div>`;
    }).join('');
    document.getElementById('newsTime').textContent = `최종 갱신: ${new Date().toLocaleTimeString('ko-KR')}`;
  } else {
    panel.innerHTML = '<div class="data-error">뉴스를 불러올 수 없습니다.<br><span style="font-size:7px;color:var(--text-dim)">네트워크 환경에 따라 일부 RSS가 차단될 수 있습니다</span></div>';
  }
}

// Initial fetch + auto refresh
function initLiveData() {
  fetchExchangeRates();
  fetchCommodities();
  fetchNews();
  // Auto refresh intervals
  setInterval(fetchExchangeRates, 60000);   // Exchange rates: every 1 min
  setInterval(fetchCommodities, 300000);     // Commodities: every 5 min
  setInterval(fetchNews, 600000);            // News: every 10 min
}
setTimeout(initLiveData, 1500); // Start after map loads
